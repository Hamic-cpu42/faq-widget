<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Liên hệ phòng ban</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #292929;
    overflow: hidden;
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar {
    display: none;
  }
  .wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 12px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 14px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 800px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
  .card {
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 18px;
    background: rgba(255,255,255,0.04);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .icon {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4fa3f7;
    flex-shrink: 0;
  }
  .icon svg { width: 24px; height: 24px; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #4fa3f7;
  }
  .card-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #e6e6e6;
    margin-bottom: 8px;
  }
  .card-line svg {
    width: 14px;
    height: 14px;
    color: #b3b3b3;
    flex-shrink: 0;
  }
  .card-text {
    font-size: 13px;
    color: #b3b3b3;
    line-height: 1.5;
  }
  .social-title {
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 14px;
  }
  .social-row {
    display: flex;
    gap: 10px;
  }
  .social-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
  }
  .social-icon svg { width: 18px; height: 18px; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="section-title">Liên hệ phòng ban</div>

  <div class="cards">

    <div class="card">
      <div class="card-header">

        </span>
        <span class="card-title">IT Support</span>
      </div>
      <div class="card-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
        it-support@bmitc.com

        0246 2936 666 (Ext: 222)
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        </span>
        <span class="card-title">Góp ý &amp; Đề xuất</span>

      <div class="card-line" style="margin-bottom:6px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
        ykien@bmitc.com
      </div>
      <div class="card-text">Chúng tôi luôn lắng nghe để phục vụ tốt hơn.</div>

    <div class="card">

  </div>
</div>

</body>
</html>
